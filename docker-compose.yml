services:
  shm-app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./backend/system_health.db:/app/backend/system_health.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
